# ── Stage 2: Multimodal Medical SFT ───────────────────────────────────────────
# Loads Stage 1 checkpoint, trains projection MLP + LoRA on PathVQA.
# Teaches model to connect BiomedCLIP visual features to medical language.
# Run on RunPod RTX 4090 (~3-5 hrs) or A100 40GB (~2-3 hrs).

model:
  encoder_type:          biomedclip
  vision_hidden_dim:     768
  llm_model_id:          Qwen/Qwen2-7B-Instruct
  llm_hidden_dim:        3584
  proj_hidden_dim:       1024
  proj_num_layers:       2
  proj_dropout:          0.0
  lora_r:                16
  lora_alpha:            32
  lora_dropout:          0.05
  lora_target_modules:   [q_proj, k_proj, v_proj, o_proj]
  load_in_4bit:          true
  bnb_4bit_quant_type:   nf4
  bnb_4bit_compute_dtype: bfloat16
  cache_dir:             artifacts/model_cache
  stage1_checkpoint:     artifacts/checkpoints/stage1/final  # load LoRA weights from stage 1

data:
  pathvqa_cache:         data/raw/pathvqa
  pathvqa_max:           null      # use all ~32K
  max_length:            512
  val_fraction:          0.05

training:
  stage:                 2
  output_dir:            artifacts/checkpoints/stage2
  num_epochs:            3
  per_device_batch_size: 2         # smaller — images add memory overhead
  gradient_accumulation: 16        # effective batch size = 32
  lora_lr:               1.0e-4    # lower than stage 1 — LoRA already warmed up
  projection_lr:         2.0e-4    # higher — projection trains from scratch here
  weight_decay:          0.01
  lr_scheduler:          cosine
  warmup_ratio:          0.05
  max_grad_norm:         1.0
  bf16:                  true
  save_steps:            200
  eval_steps:            200
  logging_steps:         25
  dataloader_workers:    2         # fewer workers — image loading is heavier
  seed:                  42

wandb:
  project:   medvision-eval
  run_name:  stage2-multimodal-sft
  tags:      [stage2, multimodal-sft, pathvqa, biomedclip]
