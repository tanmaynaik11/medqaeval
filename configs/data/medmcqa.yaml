defaults:
  - base

name: medmcqa
hf_path: medmcqa
cache_dir: data/raw/medmcqa
processed_dir: data/processed/medmcqa

# Local dev: fast cap via split-slicing (no full download)
max_samples: 200

# RunPod production: set max_samples to null and use this instead
# Downloads full 182K train set, then stratifies across 21 medical subjects
stratified_n: null   # set to 30000 on RunPod
seed: 42
